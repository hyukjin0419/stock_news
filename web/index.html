<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIRSTWAVE</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px;
           margin: 0 auto; padding: 24px; color: #1a1a1a; }
    h1 { font-size: 22px; }
    input { padding: 10px 12px; font-size: 15px; border: 1px solid #ccc;
            border-radius: 8px; width: 100%; }
    button { padding: 8px 14px; font-size: 14px; border: none; border-radius: 8px;
             background: #2563eb; color: #fff; cursor: pointer; }
    button.ghost { background: #eee; color: #333; }
    .row { display: flex; gap: 8px; align-items: center; }
    .hidden { display: none; }
    .item { display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #eee; }
    .tag { font-size: 12px; color: #fff; background: #888; border-radius: 4px;
           padding: 1px 6px; margin-left: 6px; }
    .tag.KR { background: #d33; } .tag.US { background: #2563eb; }
    .muted { color: #888; font-size: 13px; }
    #results .item { cursor: default; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
             background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 8px;
             font-size: 14px; opacity: 0; transition: opacity .2s; pointer-events: none; }
    #toast.show { opacity: 1; }
    #toast.error { background: #d33; }
  </style>
</head>
<body>
  <h1>📈 FIRSTWAVE</h1>
  <p class="muted">관심종목 뉴스 브리핑</p>

  <!-- 로그인 -->
  <section id="auth">
    <p class="muted">이메일과 비밀번호로 로그인하세요. 처음이면 회원가입을 누르세요.</p>
    <div class="row"><input id="email" type="email" placeholder="you@example.com" /></div>
    <div class="row" style="margin-top:8px;">
      <input id="password" type="password" placeholder="비밀번호 (6자 이상)" />
    </div>
    <div class="row" style="margin-top:8px;">
      <button id="loginBtn">로그인</button>
      <button id="signupBtn" class="ghost">회원가입</button>
    </div>
    <p id="authMsg" class="muted"></p>
  </section>

  <!-- 관심종목 관리 -->
  <section id="app" class="hidden">
    <div class="row" style="justify-content: space-between;">
      <span class="muted" id="who"></span>
      <button class="ghost" id="logoutBtn">로그아웃</button>
    </div>

    <h3>종목 검색</h3>
    <div class="row">
      <input id="search" placeholder="삼성전자, AAPL ..." />
    </div>
    <div id="results"></div>

    <h3>내 관심종목 <span class="muted" id="count"></span></h3>
    <div id="watchlist"></div>

    <!-- 무료 한도 도달 시 노출 -->
    <div id="upgrade" class="hidden" style="margin-top:16px;padding:14px 16px;
         background:#f8f9fa;border-radius:10px;">
      <p class="muted" style="margin:0 0 8px;">
        무료 플랜은 종목 3개까지예요. 무제한 구독(월 4,900원)은 아래 계좌로 송금해 주세요.</p>
      <div class="row" style="gap:8px;align-items:center;">
        <span id="bankInfo" style="font-weight:600;font-size:14px;"></span>
        <button id="copyBtn" class="ghost">복사</button>
      </div>
      <p class="muted" style="margin:8px 0 0;font-size:12px;">
        송금 메시지에 <b>가입 이메일</b>을 꼭 적어주세요. 확인 후 무제한으로 열어드려요.</p>
    </div>
  </section>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
